version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whyops-postgres
    environment:
      POSTGRES_DB: whyops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  whyops-proxy:
    build:
      context: .
      dockerfile: whyops-proxy/Dockerfile
    container_name: whyops-proxy
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/whyops
      - PROXY_PORT=8080
      - ANALYSE_URL=http://whyops-analyse:8081
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      whyops-analyse:
        condition: service_started
    restart: unless-stopped

  whyops-analyse:
    build:
      context: .
      dockerfile: whyops-analyse/Dockerfile
    container_name: whyops-analyse
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/whyops
      - ANALYSE_PORT=8081
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  whyops-auth:
    build:
      context: .
      dockerfile: whyops-auth/Dockerfile
    container_name: whyops-auth
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/whyops
      - AUTH_PORT=8082
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-me}
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
