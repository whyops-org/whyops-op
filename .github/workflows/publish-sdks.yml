name: Publish SDKs

on:
  workflow_dispatch:
    inputs:
      sdk:
        description: SDK to publish
        required: true
        type: choice
        options:
          - typescript
          - vercel-ai-sdk
          - langchain-js
          - python
          - go
      version:
        description: Version without leading v, e.g. 0.1.0
        required: true
        type: string

jobs:
  publish-typescript:
    if: inputs.sdk == 'typescript'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run sync:sdk-config
      - name: Verify package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          test "$PKG_VERSION" = "${{ inputs.version }}"
        working-directory: packages/sdk-typescript
      - run: npm run build
        working-directory: packages/sdk-typescript
      - name: Publish to npm if missing
        working-directory: packages/sdk-typescript
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_TOKEN_CLEAN="$(printf '%s' "$NPM_TOKEN" | tr -d '\r\n')"
          TMP_NPMRC="$(mktemp)"
          trap 'rm -f "$TMP_NPMRC"' EXIT
          cat > "$TMP_NPMRC" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN_CLEAN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          export NPM_CONFIG_USERCONFIG="$TMP_NPMRC"
          npm whoami --registry=https://registry.npmjs.org/
          if npm view "@whyops/sdk@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "@whyops/sdk@${{ inputs.version }} already exists, skipping publish"
            exit 0
          fi
          npm publish --access public --registry=https://registry.npmjs.org/
      - run: |
          if git ls-remote --exit-code --tags origin refs/tags/sdk-typescript/v${{ inputs.version }} >/dev/null 2>&1; then
            echo "Tag sdk-typescript/v${{ inputs.version }} already exists, skipping"
            exit 0
          fi
          git tag sdk-typescript/v${{ inputs.version }}
          git push origin sdk-typescript/v${{ inputs.version }}

  publish-vercel-ai-sdk:
    if: inputs.sdk == 'vercel-ai-sdk'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run sync:sdk-config
      - name: Verify package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          test "$PKG_VERSION" = "${{ inputs.version }}"
        working-directory: packages/sdk-vercel-ai
      - run: npm run build --workspace @whyops/sdk
      - run: npm run build
        working-directory: packages/sdk-vercel-ai
      - name: Publish to npm if missing
        working-directory: packages/sdk-vercel-ai
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_TOKEN_CLEAN="$(printf '%s' "$NPM_TOKEN" | tr -d '\r\n')"
          TMP_NPMRC="$(mktemp)"
          trap 'rm -f "$TMP_NPMRC"' EXIT
          cat > "$TMP_NPMRC" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN_CLEAN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          export NPM_CONFIG_USERCONFIG="$TMP_NPMRC"
          npm whoami --registry=https://registry.npmjs.org/
          if npm view "@whyops/vercel-ai-sdk@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "@whyops/vercel-ai-sdk@${{ inputs.version }} already exists, skipping publish"
            exit 0
          fi
          npm publish --access public --registry=https://registry.npmjs.org/
      - run: |
          if git ls-remote --exit-code --tags origin refs/tags/sdk-vercel-ai/v${{ inputs.version }} >/dev/null 2>&1; then
            echo "Tag sdk-vercel-ai/v${{ inputs.version }} already exists, skipping"
            exit 0
          fi
          git tag sdk-vercel-ai/v${{ inputs.version }}
          git push origin sdk-vercel-ai/v${{ inputs.version }}

  publish-langchain-js:
    if: inputs.sdk == 'langchain-js'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run sync:sdk-config
      - name: Verify package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          test "$PKG_VERSION" = "${{ inputs.version }}"
        working-directory: packages/sdk-langchain-js
      - run: npm run build --workspace @whyops/sdk
      - run: npm run build
        working-directory: packages/sdk-langchain-js
      - name: Publish to npm if missing
        working-directory: packages/sdk-langchain-js
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_TOKEN_CLEAN="$(printf '%s' "$NPM_TOKEN" | tr -d '\r\n')"
          TMP_NPMRC="$(mktemp)"
          trap 'rm -f "$TMP_NPMRC"' EXIT
          cat > "$TMP_NPMRC" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN_CLEAN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          export NPM_CONFIG_USERCONFIG="$TMP_NPMRC"
          npm whoami --registry=https://registry.npmjs.org/
          if npm view "@whyops/langchain-js@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "@whyops/langchain-js@${{ inputs.version }} already exists, skipping publish"
            exit 0
          fi
          npm publish --access public --registry=https://registry.npmjs.org/
      - run: |
          if git ls-remote --exit-code --tags origin refs/tags/sdk-langchain-js/v${{ inputs.version }} >/dev/null 2>&1; then
            echo "Tag sdk-langchain-js/v${{ inputs.version }} already exists, skipping"
            exit 0
          fi
          git tag sdk-langchain-js/v${{ inputs.version }}
          git push origin sdk-langchain-js/v${{ inputs.version }}

  publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip build twine
      - run: npm ci
      - run: npm run sync:sdk-config
      - name: Verify package version
        run: |
          python - <<'PY'
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          assert data["project"]["version"] == "${{ inputs.version }}"
          PY
        working-directory: packages/sdk-python
      - run: python -m build
        working-directory: packages/sdk-python
      - run: python -m twine check dist/*
        working-directory: packages/sdk-python
      - run: |
          PYPI_TOKEN_CLEAN="$(printf '%s' "$PYPI_API_TOKEN" | tr -d '\r\n')"
          export TWINE_USERNAME=__token__
          export TWINE_PASSWORD="$PYPI_TOKEN_CLEAN"
          export TWINE_NON_INTERACTIVE=1
          python -m twine upload --skip-existing --verbose dist/*
        working-directory: packages/sdk-python
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - run: |
          if git ls-remote --exit-code --tags origin refs/tags/sdk-python/v${{ inputs.version }} >/dev/null 2>&1; then
            echo "Tag sdk-python/v${{ inputs.version }} already exists, skipping"
            exit 0
          fi
          git tag sdk-python/v${{ inputs.version }}
          git push origin sdk-python/v${{ inputs.version }}

  publish-go:
    if: inputs.sdk == 'go'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm ci
      - run: npm run sync:sdk-config
      - run: go test ./...
        working-directory: packages/sdk-go
      - run: |
          if git ls-remote --exit-code --tags origin refs/tags/packages/sdk-go/v${{ inputs.version }} >/dev/null 2>&1; then
            echo "Tag packages/sdk-go/v${{ inputs.version }} already exists, skipping"
            exit 0
          fi
          git tag packages/sdk-go/v${{ inputs.version }}
          git push origin packages/sdk-go/v${{ inputs.version }}
