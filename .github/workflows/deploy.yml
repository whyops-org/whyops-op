name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - proxy
          - analyse
          - auth
          - all

env:
  IMAGE_NAME: ${{ github.event.inputs.service || 'all' }}

jobs:
  deploy-proxy:
    if: github.event.inputs.service == 'proxy' || github.event.inputs.service == 'all' || (github.event.inputs.service == '' && github.event_name == 'push')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push proxy image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-proxy:${{ github.sha }}
          file: ./Dockerfile
          context: .
          build-args: |
            SERVICE=proxy
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (proxy)
        run: |
          ENV_VARS=(
            "NODE_ENV=${{ secrets.NODE_ENV || 'production' }}"
            "LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}"
            "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            "PROXY_PORT=${{ secrets.PROXY_PORT || '8080' }}"
            "ANALYSE_PORT=${{ secrets.ANALYSE_PORT || '8081' }}"
            "AUTH_PORT=${{ secrets.AUTH_PORT || '8082' }}"
            "PROXY_URL=${{ secrets.PROXY_URL }}"
            "ANALYSE_URL=${{ secrets.ANALYSE_URL }}"
            "AUTH_URL=${{ secrets.AUTH_URL }}"
            "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            "API_KEY_PREFIX=${{ secrets.API_KEY_PREFIX || 'whyops' }}"
            "RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS || '60000' }}"
            "RATE_LIMIT_MAX_REQUESTS=${{ secrets.RATE_LIMIT_MAX_REQUESTS || '100' }}"
            "PROXY_TIMEOUT_MS=${{ secrets.PROXY_TIMEOUT_MS || '60000' }}"
            "PROXY_MAX_RETRIES=${{ secrets.PROXY_MAX_RETRIES || '3' }}"
            "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}"
            "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
            "AUTHGH_CLIENT_ID=${{ secrets.AUTHGH_CLIENT_ID }}"
            "AUTHGH_CLIENT_SECRET=${{ secrets.AUTHGH_CLIENT_SECRET }}"
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
            "MAILEROO_API_KEY=${{ secrets.MAILEROO_API_KEY }}"
            "MAILEROO_FROM_EMAIL=${{ secrets.MAILEROO_FROM_EMAIL || 'noreply@whyops.com' }}"
            "MAILEROO_FROM_NAME=${{ secrets.MAILEROO_FROM_NAME || 'WhyOps' }}"
          )

          # Check provisioning state
          PROVISIONING_STATE=$(az containerapp show --name whyops-proxy --resource-group ${{ secrets.RESOURCE_GROUP }} --query properties.provisioningState -o tsv 2>/dev/null || echo "NotFound")
          
          if [[ "$PROVISIONING_STATE" == "Succeeded" ]]; then
            echo "Updating existing whyops-proxy..."
            az containerapp update \
              --name whyops-proxy \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-proxy:${{ github.sha }} \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --set-env-vars "${ENV_VARS[@]}"
          else
            echo "Creating whyops-proxy (state: $PROVISIONING_STATE)..."
            [[ "$PROVISIONING_STATE" != "NotFound" ]] && az containerapp delete --name whyops-proxy --resource-group ${{ secrets.RESOURCE_GROUP }} --yes || true
            az containerapp create \
              --name whyops-proxy \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --environment ${{ secrets.CONTAINER_APP_ENVIRONMENT }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-proxy:${{ github.sha }} \
              --registry-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --target-port 8080 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --env-vars "${ENV_VARS[@]}"
          fi

  deploy-analyse:
    if: github.event.inputs.service == 'analyse' || github.event.inputs.service == 'all' || (github.event.inputs.service == '' && github.event_name == 'push')
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push analyse image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-analyse:${{ github.sha }}
          file: ./Dockerfile
          context: .
          build-args: |
            SERVICE=analyse
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (analyse)
        run: |
          ENV_VARS=(
            "NODE_ENV=${{ secrets.NODE_ENV || 'production' }}"
            "LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}"
            "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            "PROXY_PORT=${{ secrets.PROXY_PORT || '8080' }}"
            "ANALYSE_PORT=${{ secrets.ANALYSE_PORT || '8081' }}"
            "AUTH_PORT=${{ secrets.AUTH_PORT || '8082' }}"
            "PROXY_URL=${{ secrets.PROXY_URL }}"
            "ANALYSE_URL=${{ secrets.ANALYSE_URL }}"
            "AUTH_URL=${{ secrets.AUTH_URL }}"
            "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            "API_KEY_PREFIX=${{ secrets.API_KEY_PREFIX || 'whyops' }}"
            "RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS || '60000' }}"
            "RATE_LIMIT_MAX_REQUESTS=${{ secrets.RATE_LIMIT_MAX_REQUESTS || '100' }}"
            "PROXY_TIMEOUT_MS=${{ secrets.PROXY_TIMEOUT_MS || '60000' }}"
            "PROXY_MAX_RETRIES=${{ secrets.PROXY_MAX_RETRIES || '3' }}"
            "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}"
            "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
            "AUTHGH_CLIENT_ID=${{ secrets.AUTHGH_CLIENT_ID }}"
            "AUTHGH_CLIENT_SECRET=${{ secrets.AUTHGH_CLIENT_SECRET }}"
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
            "MAILEROO_API_KEY=${{ secrets.MAILEROO_API_KEY }}"
            "MAILEROO_FROM_EMAIL=${{ secrets.MAILEROO_FROM_EMAIL || 'noreply@whyops.com' }}"
            "MAILEROO_FROM_NAME=${{ secrets.MAILEROO_FROM_NAME || 'WhyOps' }}"
          )

          PROVISIONING_STATE=$(az containerapp show --name whyops-analyse --resource-group ${{ secrets.RESOURCE_GROUP }} --query properties.provisioningState -o tsv 2>/dev/null || echo "NotFound")
          
          if [[ "$PROVISIONING_STATE" == "Succeeded" ]]; then
            echo "Updating existing whyops-analyse..."
            az containerapp update \
              --name whyops-analyse \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-analyse:${{ github.sha }} \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --set-env-vars "${ENV_VARS[@]}"
          else
            echo "Creating whyops-analyse (state: $PROVISIONING_STATE)..."
            [[ "$PROVISIONING_STATE" != "NotFound" ]] && az containerapp delete --name whyops-analyse --resource-group ${{ secrets.RESOURCE_GROUP }} --yes || true
            az containerapp create \
              --name whyops-analyse \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --environment ${{ secrets.CONTAINER_APP_ENVIRONMENT }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-analyse:${{ github.sha }} \
              --registry-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --target-port 8081 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --env-vars "${ENV_VARS[@]}"
          fi

  deploy-auth:
    if: github.event.inputs.service == 'auth' || github.event.inputs.service == 'all' || (github.event.inputs.service == '' && github.event_name == 'push')
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-analyse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push auth image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-auth:${{ github.sha }}
          file: ./Dockerfile
          context: .
          build-args: |
            SERVICE=auth
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (auth)
        run: |
          ENV_VARS=(
            "NODE_ENV=${{ secrets.NODE_ENV || 'production' }}"
            "LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}"
            "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            "PROXY_PORT=${{ secrets.PROXY_PORT || '8080' }}"
            "ANALYSE_PORT=${{ secrets.ANALYSE_PORT || '8081' }}"
            "AUTH_PORT=${{ secrets.AUTH_PORT || '8082' }}"
            "PROXY_URL=${{ secrets.PROXY_URL }}"
            "ANALYSE_URL=${{ secrets.ANALYSE_URL }}"
            "AUTH_URL=${{ secrets.AUTH_URL }}"
            "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            "API_KEY_PREFIX=${{ secrets.API_KEY_PREFIX || 'whyops' }}"
            "RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS || '60000' }}"
            "RATE_LIMIT_MAX_REQUESTS=${{ secrets.RATE_LIMIT_MAX_REQUESTS || '100' }}"
            "PROXY_TIMEOUT_MS=${{ secrets.PROXY_TIMEOUT_MS || '60000' }}"
            "PROXY_MAX_RETRIES=${{ secrets.PROXY_MAX_RETRIES || '3' }}"
            "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}"
            "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
            "AUTHGH_CLIENT_ID=${{ secrets.AUTHGH_CLIENT_ID }}"
            "AUTHGH_CLIENT_SECRET=${{ secrets.AUTHGH_CLIENT_SECRET }}"
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
            "MAILEROO_API_KEY=${{ secrets.MAILEROO_API_KEY }}"
            "MAILEROO_FROM_EMAIL=${{ secrets.MAILEROO_FROM_EMAIL || 'noreply@whyops.com' }}"
            "MAILEROO_FROM_NAME=${{ secrets.MAILEROO_FROM_NAME || 'WhyOps' }}"
          )

          PROVISIONING_STATE=$(az containerapp show --name whyops-auth --resource-group ${{ secrets.RESOURCE_GROUP }} --query properties.provisioningState -o tsv 2>/dev/null || echo "NotFound")
          
          if [[ "$PROVISIONING_STATE" == "Succeeded" ]]; then
            echo "Updating existing whyops-auth..."
            az containerapp update \
              --name whyops-auth \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-auth:${{ github.sha }} \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --set-env-vars "${ENV_VARS[@]}"
          else
            echo "Creating whyops-auth (state: $PROVISIONING_STATE)..."
            [[ "$PROVISIONING_STATE" != "NotFound" ]] && az containerapp delete --name whyops-auth --resource-group ${{ secrets.RESOURCE_GROUP }} --yes || true
            az containerapp create \
              --name whyops-auth \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --environment ${{ secrets.CONTAINER_APP_ENVIRONMENT }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-auth:${{ github.sha }} \
              --registry-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --target-port 8082 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --env-vars "${ENV_VARS[@]}"
          fi
