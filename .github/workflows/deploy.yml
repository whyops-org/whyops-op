          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push analyse image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-analyse:${{ github.sha }}
          file: ./Dockerfile
          context: .
          build-args: |
            SERVICE=analyse
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (analyse)
        run: |
          ENV_VARS=(
            "NODE_ENV=${{ secrets.NODE_ENV || 'production' }}"
            "LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}"
            "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            "PROXY_PORT=${{ secrets.PROXY_PORT || '8080' }}"
            "ANALYSE_PORT=${{ secrets.ANALYSE_PORT || '8081' }}"
            "AUTH_PORT=${{ secrets.AUTH_PORT || '8082' }}"
            "PROXY_URL=${{ secrets.PROXY_URL }}"
            "ANALYSE_URL=${{ secrets.ANALYSE_URL }}"
            "AUTH_URL=${{ secrets.AUTH_URL }}"
            "INTERNAL_PROXY_URL=${{ secrets.INTERNAL_PROXY_URL }}"
            "INTERNAL_ANALYSE_URL=${{ secrets.INTERNAL_ANALYSE_URL }}"
            "INTERNAL_AUTH_URL=${{ secrets.INTERNAL_AUTH_URL }}"
            "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            "API_KEY_PREFIX=${{ secrets.API_KEY_PREFIX || 'whyops' }}"
            "RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS || '60000' }}"
            "RATE_LIMIT_MAX_REQUESTS=${{ secrets.RATE_LIMIT_MAX_REQUESTS || '100' }}"
            "PROXY_TIMEOUT_MS=${{ secrets.PROXY_TIMEOUT_MS || '60000' }}"
            "PROXY_MAX_RETRIES=${{ secrets.PROXY_MAX_RETRIES || '3' }}"
            "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}"
            "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
            "AUTHGH_CLIENT_ID=${{ secrets.AUTHGH_CLIENT_ID }}"
            "AUTHGH_CLIENT_SECRET=${{ secrets.AUTHGH_CLIENT_SECRET }}"
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
            "MAILEROO_API_KEY=${{ secrets.MAILEROO_API_KEY }}"
            "MAILEROO_FROM_EMAIL=${{ secrets.MAILEROO_FROM_EMAIL || 'noreply@whyops.com' }}"
            "MAILEROO_FROM_NAME=${{ secrets.MAILEROO_FROM_NAME || 'WhyOps' }}"
            "TRUSTED_ORIGINS=${{ secrets.TRUSTED_ORIGINS || 'https://app.whyops.com,https://whyops.com' }}"
            "COOKIE_DOMAIN=${{ secrets.COOKIE_DOMAIN || '.whyops.com' }}"
            "DB_SSL=${{ secrets.DB_SSL || 'false' }}"
            "DB_SSL_REJECT_UNAUTHORIZED=${{ secrets.DB_SSL_REJECT_UNAUTHORIZED || 'false' }}"
            "REDIS_URL=${{ secrets.REDIS_URL }}"
            "REDIS_KEY_PREFIX=${{ secrets.REDIS_KEY_PREFIX || 'whyops' }}"
            "EVENTS_STREAM_NAME=${{ secrets.EVENTS_STREAM_NAME || 'whyops:events' }}"
            "EVENTS_DLQ_STREAM_NAME=${{ secrets.EVENTS_DLQ_STREAM_NAME || 'whyops:events:dlq' }}"
            "EVENTS_STREAM_GROUP=${{ secrets.EVENTS_STREAM_GROUP || 'whyops-analyse-workers' }}"
            "EVENTS_STREAM_MAX_LEN=${{ secrets.EVENTS_STREAM_MAX_LEN || '200000' }}"
            "EVENTS_STREAM_BATCH_SIZE=${{ secrets.EVENTS_STREAM_BATCH_SIZE || '100' }}"
            "EVENTS_STREAM_BLOCK_MS=${{ secrets.EVENTS_STREAM_BLOCK_MS || '2000' }}"
            "EVENTS_STREAM_RETRY_MAX=${{ secrets.EVENTS_STREAM_RETRY_MAX || '5' }}"
            "EVENTS_WORKER_ENABLED=${{ secrets.EVENTS_WORKER_ENABLED || 'true' }}"
            "AUTH_APIKEY_CACHE_TTL_SEC=${{ secrets.AUTH_APIKEY_CACHE_TTL_SEC || '60' }}"
            "PROVIDER_CACHE_TTL_SEC=${{ secrets.PROVIDER_CACHE_TTL_SEC || '60' }}"
            "APIKEY_LAST_USED_WRITE_INTERVAL_SEC=${{ secrets.APIKEY_LAST_USED_WRITE_INTERVAL_SEC || '300' }}"
            "JUDGE_LLM_BASE_URL=${{ secrets.JUDGE_LLM_BASE_URL || 'https://litellm.whiteocean-2fb73b80.centralindia.azurecontainerapps.io/v1' }}"
            "JUDGE_LLM_API_KEY=${{ secrets.JUDGE_LLM_API_KEY }}"
            "JUDGE_LLM_MODEL=${{ secrets.JUDGE_LLM_MODEL || 'azure/gpt-4.1' }}"
            "JUDGE_LLM_TEMPERATURE=${{ secrets.JUDGE_LLM_TEMPERATURE || '0' }}"
            "JUDGE_MAX_RETRIES=${{ secrets.JUDGE_MAX_RETRIES || '2' }}"
            "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
          )

          PROVISIONING_STATE=$(az containerapp show --name whyops-analyse-ci --resource-group ${{ secrets.RESOURCE_GROUP }} --query properties.provisioningState -o tsv 2>/dev/null || echo "NotFound")
          
          if [[ "$PROVISIONING_STATE" == "Succeeded" ]]; then
            echo "Updating existing whyops-analyse-ci..."
            az containerapp update \
              --name whyops-analyse-ci \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-analyse:${{ github.sha }} \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 1 \
              --memory 2Gi \
              --set-env-vars "${ENV_VARS[@]}"
          else
            echo "Creating whyops-analyse-ci (state: $PROVISIONING_STATE)..."
            [[ "$PROVISIONING_STATE" != "NotFound" ]] && az containerapp delete --name whyops-analyse-ci --resource-group ${{ secrets.RESOURCE_GROUP }} --yes || true
            az containerapp create \
              --name whyops-analyse-ci \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --environment ${{ secrets.CONTAINER_APP_ENVIRONMENT }} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/whyops-analyse:${{ github.sha }} \
              --registry-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --target-port 8081 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 1 \
              --memory 2Gi \
              --env-vars "${ENV_VARS[@]}"
          fi

  deploy-auth:
    if: github.event.inputs.service == 'auth' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
